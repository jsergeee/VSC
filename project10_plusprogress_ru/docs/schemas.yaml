      description: Может отличаться от базовой (скидка, акция)
      format: decimal
      pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      title: Стоимость для ученика
      type: string
    discount:
      format: decimal
      pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
      title: Скидка %
      type: string
