Deposit:
  description: Сериализатор для депозитов
  properties:
    amount:
      format: decimal
      pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      title: Сумма
      type: string
    created_at:
      format: date-time
      readOnly: true
      title: Дата
      type: string
    created_by:
      nullable: true
      type: integer
    description:
      maxLength: 200
      title: Описание
      type: string
    id:
      readOnly: true
      type: integer
    student:
      type: integer
    student_name:
      readOnly: true
      type: string
  required:
  - amount
  - created_at
  - id
  - student
  - student_name
  type: object
GroupEnrollment:
