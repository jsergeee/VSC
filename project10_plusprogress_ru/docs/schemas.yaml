      format: time
      title: Время начала
      type: string
    status:
      allOf:
      - $ref: '#/components/schemas/StatusD86Enum'
      title: Статус
    students_count:
      readOnly: true
      type: string
    subject:
      title: Предмет
      type: integer
    subject_name:
      readOnly: true
      type: string
    teacher:
      title: Учитель
      type: integer
    teacher_name:
      readOnly: true
      type: string
