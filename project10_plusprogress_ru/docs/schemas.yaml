      title: Групповое занятие
      type: integer
    id:
      readOnly: true
      type: integer
    registered_at:
      format: date-time
      readOnly: true
      title: Зарегистрирован
      type: string
    status:
      allOf:
      - $ref: '#/components/schemas/Status543Enum'
      title: Статус
    student:
      title: Ученик
      type: integer
    student_name:
      readOnly: true
      type: string
  required:
  - cost_to_pay
  - group_lesson
  - id
  - registered_at
  - student
  - student_name
  type: object
GroupLesson:
  description: Сериализатор для групповых уроков
  properties:
    base_price:
      description: 'Для per_student: цена за одного, для fixed: цена за всю группу'
      format: decimal
      pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      title: Базовая стоимость
      type: string
